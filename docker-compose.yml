version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nuke
      POSTGRES_PASSWORD: nuke
      POSTGRES_DB: nuke
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio_data:/data

  # Optional: enables real virus scanning of uploads in dev. The backend
  # degrades gracefully (skips scanning, logs a warning) if this is not running.
  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    ports:
      - "3310:3310"

volumes:
  postgres_data:
  minio_data:
